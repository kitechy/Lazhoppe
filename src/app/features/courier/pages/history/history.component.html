<div class="flex justify-between items-center mb-8">
  <div>
    <h1 class="text-[#C8A97E] text-sm">COURIER</h1>

    <h2 class="text-white text-4xl font-bold">My Deliveries</h2>

    <p class="text-gray-500 mt-2">Orders assigned to you.</p>
  </div>
</div>

<div class="space-y-6">
  <div
    *ngFor="let order of orders"
    class="bg-[#141414] rounded-xl border border-[#2A2A2A] p-6"
  >
    <div class="flex justify-between">
      <div>
        <h3 class="text-white text-xl font-semibold">
          {{ order.store.storeName }}
        </h3>

        <p class="text-gray-400">
          {{ order.shipping.address }}
        </p>

        <p class="text-gray-400">
          {{ order.customer.firstName }}
          {{ order.customer.lastName }}
        </p>
      </div>

      <div class="text-right">
        <p class="text-[#C8A97E] font-bold text-xl">₱{{ order.total }}</p>

        <span class="text-green-400">
          {{ order.status }}
        </span>
      </div>
    </div>

    <div class="mt-5 space-y-3">
      <div *ngFor="let item of order.items" class="flex items-center gap-3">
        <img
          [src]="getImageUrl(item.product.imageUrl)"
          class="w-14 h-14 rounded-lg object-cover"
        />

        <div>
          <p class="text-white">
            {{ item.product.name }}
          </p>

          <p class="text-gray-500">Qty: {{ item.quantity }}</p>
        </div>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button
        *ngIf="order.status === 'Picked Up'"
        (click)="updateStatus(order, 'On the Way')"
        class="bg-blue-600 px-4 py-2 rounded-lg text-white"
      >
        On the Way
      </button>

      <button
        *ngIf="order.status === 'On the Way'"
        (click)="updateStatus(order, 'Delivered')"
        class="bg-green-600 px-4 py-2 rounded-lg text-white"
      >
        Mark Delivered
      </button>

      <span
        *ngIf="order.status === 'Delivered'"
        class="text-green-400 font-semibold"
      >
        ✔ Delivered
      </span>
    </div>
  </div>
</div>

<div *ngIf="!loading && !orders.length" class="text-center text-gray-500 mt-20">
  No deliveries assigned.
</div>
