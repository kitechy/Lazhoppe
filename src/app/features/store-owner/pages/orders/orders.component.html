<div class="flex justify-between items-center mb-8">
  <div>
    <h1 class="text-[#C8A97E] text-sm">STORE</h1>

    <h2 class="text-white text-4xl font-bold">Orders</h2>

    <p class="text-gray-500 mt-2">Manage customer orders.</p>
  </div>
</div>

<div class="space-y-8">
  <div
    *ngFor="let order of orders"
    class="bg-[#141414] rounded-xl border border-[#252525] overflow-hidden"
  >
    <div class="p-6 border-b border-[#252525] flex justify-between">
      <div>
        <h2 class="text-white font-semibold text-xl">
          {{ order.customer.firstName }}

          {{ order.customer.lastName }}
        </h2>

        <p class="text-gray-400">
          {{ order.createdAt | date: "medium" }}
        </p>
      </div>

      <div>
        <span class="text-[#C8A97E]">
          {{ order.status }}
        </span>
      </div>
    </div>

    <div
      *ngFor="let item of order.items"
      class="flex justify-between items-center p-5 border-b border-[#252525]"
    >
      <div class="flex gap-5 items-center">
        <img
          [src]="getImageUrl(item.product.imageUrl)"
          class="w-20 h-20 rounded-lg object-cover"
        />

        <div>
          <h3 class="text-white">
            {{ item.product.name }}
          </h3>

          <p class="text-gray-500">Qty {{ item.quantity }}</p>
        </div>
      </div>

      <div class="text-[#C8A97E]">₱ {{ item.price }}</div>
    </div>

    <div class="p-6 flex justify-between items-center">
      <div>
        <p class="text-gray-500">Total</p>

        <h2 class="text-[#C8A97E] text-3xl font-bold">₱ {{ order.total }}</h2>
      </div>

      <div class="flex gap-3">
        <button
          *ngIf="order.status == 'Pending'"
          (click)="updateStatus(order, 'Accepted')"
          class="bg-green-600 px-5 py-3 rounded-lg"
        >
          Accept
        </button>

        <button
          *ngIf="order.status == 'Accepted'"
          (click)="updateStatus(order, 'Preparing')"
          class="bg-yellow-600 px-5 py-3 rounded-lg"
        >
          Preparing
        </button>

        <button
          *ngIf="order.status == 'Preparing'"
          (click)="updateStatus(order, 'Ready for Pickup')"
          class="bg-blue-600 px-5 py-3 rounded-lg"
        >
          Ready for Pickup
        </button>
      </div>
    </div>
  </div>
</div>
