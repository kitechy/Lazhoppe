<div class="p-8 bg-white">
  <h1 class="text-3xl font-bold mb-6">Complete Store Setup</h1>

  <google-map
    [center]="center"
    [zoom]="zoom"
    height="600px"
    width="100%"
    (mapClick)="mapClicked($event)"
  >
    <map-marker *ngIf="markerPosition" [position]="markerPosition">
    </map-marker>
  </google-map>
  <button
    (click)="saveStore()"
    class="mt-6 bg-[#C8A97E] text-black px-6 py-3 rounded-lg font-semibold hover:opacity-90"
  >
    Save Location
  </button>
</div>
