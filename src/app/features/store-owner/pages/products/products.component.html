<div class="flex justify-between items-center mb-8">
  <div>
    <h1 class="text-[#C8A97E] text-sm">MANAGE</h1>
    <h2 class="text-white text-4xl font-bold">Products</h2>
    <p class="text-gray-500 mt-2">
      Manage the products available in your store.
    </p>
  </div>

  <button
    (click)="openAddModal()"
    class="bg-[#C8A97E] text-black px-5 py-3 rounded-lg font-semibold hover:opacity-90"
  >
    + Add Product
  </button>
</div>

<div class="bg-[#141414] rounded-xl overflow-hidden">
  <table class="w-full">
    <thead class="bg-[#1F1F1F] text-gray-400">
      <tr>
        <th class="text-left p-4">Image</th>

        <th class="text-left p-4">Product</th>

        <th class="text-left p-4">Category</th>

        <th class="text-left p-4">Price</th>

        <th class="text-left p-4">Stock</th>

        <th class="text-left p-4">Status</th>

        <th class="text-left p-4">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let product of products" class="border-t border-[#2A2A2A]">
        <td class="p-4">
          <img
            [src]="product.imageUrl || 'assets/no-image.png'"
            class="w-14 h-14 rounded-lg object-cover"
          />
        </td>

        <td class="p-4 text-white">
          {{ product.name }}
        </td>

        <td class="p-4 text-gray-300">
          {{ product.category }}
        </td>

        <td class="p-4 text-gray-300">₱{{ product.price }}</td>

        <td class="p-4 text-gray-300">
          {{ product.stock }}
        </td>

        <td class="p-4">
          <span
            class="px-3 py-1 rounded-full text-sm"
            [ngClass]="
              product.isActive
                ? 'bg-green-900 text-green-300'
                : 'bg-red-900 text-red-300'
            "
          >
            {{ product.isActive ? "Active" : "Inactive" }}
          </span>
        </td>

        <td class="p-4">
          <button
            (click)="editProduct(product)"
            class="text-[#C8A97E] hover:underline mr-4"
          >
            <i class="fa-solid fa-pen-to-square"></i>
          </button>

          <button
            (click)="toggleProductStatus(product)"
            class="text-red-500 hover:underline"
          >
            <i
              class="fa-solid"
              [ngClass]="
                product.isActive
                  ? 'fa-toggle-off text-red-500'
                  : 'fa-toggle-on text-green-500'
              "
            >
            </i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div
    *ngIf="showAddModal"
    class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-6"
  >
    <div
      class="bg-[#141414] rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"
    >
      <div
        class="flex justify-between items-center p-6 border-b border-[#2A2A2A] text-white"
      >
        {{ editingProduct ? "Edit Product" : "Add Product" }}

        <button
          (click)="closeAddModal()"
          class="text-gray-400 hover:text-white text-xl"
        >
          ✕
        </button>
      </div>

      <div class="p-6 space-y-5">
        <div>
          <label class="block text-gray-300 mb-2"> Product Name </label>

          <input
            [(ngModel)]="newProduct.name"
            class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
          />
        </div>

        <div>
          <label class="block text-gray-300 mb-2"> Description </label>

          <textarea
            rows="4"
            [(ngModel)]="newProduct.description"
            class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
          ></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 mb-2"> Category </label>

            <input
              [(ngModel)]="newProduct.category"
              class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
            />
          </div>

          <div>
            <label class="block text-gray-300 mb-2"> Price </label>

            <input
              type="number"
              [(ngModel)]="newProduct.price"
              class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-300 mb-2"> Stock </label>

            <input
              type="number"
              [(ngModel)]="newProduct.stock"
              class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
            />
          </div>

          <div>
            <label class="block text-gray-300 mb-2"> Image URL </label>

            <input
              [(ngModel)]="newProduct.imageUrl"
              class="w-full rounded-lg bg-[#1E1E1E] text-white p-3"
              placeholder="Temporary"
            />
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-3 p-6 border-t border-[#2A2A2A]">
        <button
          (click)="closeAddModal()"
          class="px-5 py-3 rounded-lg bg-gray-700 text-white"
        >
          Cancel
        </button>

        <button
          (click)="saveProduct()"
          class="px-5 py-3 rounded-lg bg-[#C8A97E] text-black font-semibold"
        >
          {{ editingProduct ? "Update Product" : "Save Product" }}
        </button>
      </div>
    </div>
  </div>
</div>
