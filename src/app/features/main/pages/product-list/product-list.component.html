<section class="p-8 mt-8">
  <div class="flex items-center justify-between mb-12 gap-4">
    <div>
      <h4 class="text-primary">
        {{ selectedCategory ? selectedCategory : "COLLECTIONS" }}
      </h4>
    </div>
    <div class="flex items-center relative">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        class="p-4 rounded-full bg-dark w-96 text-white opacity-50"
        placeholder="Search..."
      />
      <i class="fa-solid fa-search text-light text-2xl absolute right-5"></i>
    </div>
  </div>

  <ng-container *ngIf="displayedProducts.length; else noProducts">
    <!-- Single Category View (All Products) -->
    <ng-container *ngIf="selectedCategory">
      <div class="relative">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 lg:grid-cols-5">
          <div
            class="w-[250px] h-fit flex flex-col items-center py-4 px-2 gap-4 bg-light hover:-translate-y-4 transition duration-300 ease-in cursor-pointer rounded-lg shadow-md hover:shadow-lg"
            *ngFor="let product of displayedProducts"
          >
            <div
              class="w-[200px] h-[200px] flex items-center justify-center overflow-hidden bg-white rounded"
            >
              <img
                [src]="getImageUrl(product.imageUrl)"
                [alt]="product.name"
                class="w-full h-full object-contain"
              />
            </div>
            <div class="w-5/6 text-center">
              <strong class="text-dark">{{ product.name }}</strong>
              <p class="text-sm text-gray-600">{{ "₱ " + product.price }}</p>
            </div>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- Multiple Categories View (Limited Products) -->
    <ng-container *ngIf="!selectedCategory">
      <div *ngFor="let category of categories" class="mb-16">
        <!-- Category Header -->
        <div class="text-center mb-8">
          <h3 class="text-primary text-3xl font-bold">
            {{ category }}
          </h3>
        </div>

        <!-- Products Grid -->
        <div class="tees relative">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8 lg:grid-cols-5">
            <div
              class="w-[250px] h-fit flex flex-col items-center py-4 px-2 gap-4 bg-light hover:-translate-y-4 transition duration-300 ease-in cursor-pointer rounded-lg shadow-md hover:shadow-lg"
              [routerLink]="['/product', product._id]"
              *ngFor="let product of getDisplayedProductsByCategory(category)"
            >
              <div
                class="w-[200px] h-[200px] flex items-center justify-center overflow-hidden bg-white rounded"
              >
                <img
                  [src]="getImageUrl(product.imageUrl)"
                  [alt]="product.name"
                  class="w-full h-full object-contain"
                />
              </div>
              <div class="w-5/6 text-center">
                <strong class="text-dark">{{ product.name }}</strong>
                <p class="text-sm text-gray-600">{{ "₱ " + product.price }}</p>
              </div>
            </div>
          </div>
        </div>
        <div class="mt-16 text-center">
          <a
            *ngIf="hasMoreProducts(category)"
            (click)="viewAllCategory(category)"
            class="text-primary hover:text-dark hover:underline cursor-pointer font-semibold transition"
          >
            See All →
          </a>
        </div>
      </div>
    </ng-container>

    <!-- Toast Notification -->
    <div
      *ngIf="showToast"
      class="fixed bottom-6 right-6 max-w-xs rounded-xl bg-black/90 px-5 py-3 text-white shadow-xl backdrop-blur-sm"
    >
      {{ toastMessage }}
    </div>
  </ng-container>

  <ng-template #noProducts>
    <div class="text-center py-16">
      <p class="text-gray-500 text-lg">No products available right now.</p>
    </div>
  </ng-template>
</section>
